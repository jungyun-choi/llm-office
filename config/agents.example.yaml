schema_version: 1

# 실제 사내 경로는 여기에서만 지정한다. 코드와 프롬프트에 경로를 하드코딩하지 않는다.
project_context:
  roots:
    llm_wiki: "<path-to-.LLM>"
    common: "<path-to-common>"
    ftl: "<path-to-FTL>"
    fil: "<path-to-FIL>"
    hil: "<path-to-HIL>"
    dld: "<path-or-glob-to-DLD>"
    topview: "<path-or-glob-to-TopView>"

# OpenCode가 실제로 인식하는 모델 ID로 바꾼다. UI는 이 목록의 id만 선택한다.
model_catalog:
  - id: codellmpro
    label: CodeLLMPro
    opencode_model: "<company-provider>/CodeLLMPro"
  - id: company-general
    label: 사내 범용 LLM
    opencode_model: "<company-provider>/<general-model>"

# POC는 여섯 좌석으로 단순화한다. 세부 역할은 사내 적용 후 필요할 때만 분리한다.
agents:
  - id: office-manager
    name: 오비트
    role: orchestrator
    runtime_role: orchestrator
    purpose: 요청을 분해하고 필요한 분석만 배정한 뒤 Claude 인계팩으로 통합한다.
    model: company-general
    reads: [work_request]
    produces: [work_plan, claude_handoff]

  - id: dld-researcher
    name: 딜디
    role: dld_researcher
    runtime_role: research
    purpose: .LLM Wiki와 DLD에서 기능의 상세 스펙, 컨벤션, 디버깅 이력을 찾는다.
    model: company-general
    reads: [llm_wiki, dld]
    produces: [spec_summary, evidence_map]

  - id: code-model-analyst
    name: 코드-X
    role: code_model_analyst
    runtime_role: framework
    purpose: common, FTL, FIL, HIL 코드를 따라 수정 지점과 성능 모델 영향을 정리한다.
    model: codellmpro
    reads: [common, ftl, fil, hil, spec_summary]
    produces: [code_impact, model_impact]

  - id: topview-analyst
    name: 탑뷰
    role: topview_analyst
    runtime_role: estimate
    purpose: 커맨드 시나리오별 패킷 흐름을 읽고 영향 범위, 의존성, 상대 공수를 정리한다.
    model: company-general
    reads: [topview, code_impact, model_impact]
    produces: [flow_summary, work_breakdown, estimate]

  - id: test-architect
    name: 베리파이
    role: test_architect
    runtime_role: test
    purpose: 기능·회귀·성능 모델 정합성 테스트와 수용 기준을 작성한다.
    model: codellmpro
    reads: [spec_summary, code_impact, flow_summary]
    produces: [test_plan, acceptance_criteria]

  - id: claude-handoff
    name: 핸드오프
    role: claude_handoff
    runtime_role: git
    purpose: Claude가 바로 코딩할 수 있는 파일 목록, 스펙, 변경 순서, 테스트, Git 이슈를 묶는다.
    model: codellmpro
    reads: [spec_summary, code_impact, model_impact, flow_summary, work_breakdown, test_plan]
    produces: [claude_handoff, git_issue_draft]
